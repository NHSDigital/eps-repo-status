name: merge to main workflow

on:
  push:
    branches: [main]

permissions: {}

jobs:
  get_config_values:
    uses: NHSDigital/eps-common-workflows/.github/workflows/get-repo-config.yml@bbee5e323229361faa29f4869f8d8984852d0fe9 # v6.0.27
    secrets:
      ATTESTATION_VERIFY_APP_ID: ${{ secrets.ATTESTATION_VERIFY_APP_ID }}
      ATTESTATION_VERIFY_PEM: ${{ secrets.ATTESTATION_VERIFY_PEM }}
    permissions:
      attestations: read
      contents: read
      packages: read

  quality_checks:
    uses: NHSDigital/eps-common-workflows/.github/workflows/quality-checks-devcontainer.yml@bda627e2ce1a32ea56bcc815aec57b06cfa63c9d
    needs: [get_config_values]
    permissions:
      contents: read
      id-token: write
      packages: read
    with:
      pinned_image: ${{ needs.get_config_values.outputs.pinned_image }}
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  tag_release:
    needs: [quality_checks, get_config_values]
    uses: NHSDigital/eps-common-workflows/.github/workflows/tag-release-devcontainer.yml@bda627e2ce1a32ea56bcc815aec57b06cfa63c9d
    permissions:
      id-token: write
      contents: write
      packages: write
    with:
      dry_run: false
      pinned_image: ${{ needs.get_config_values.outputs.pinned_image }}
      branch_name: main
      tag_format: ${{ needs.get_config_values.outputs.tag_format }}
